services:
  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: repuestos-scraper
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3001}:3000"
    environment:
      PORT: 3000
      CUSTOM_PROVIDER_DOMAINS: ${CUSTOM_PROVIDER_DOMAINS:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-repuestos_uy}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./output:/app/output

  postgres:
    image: postgres:16-alpine
    container_name: repuestos-scraper-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-repuestos_uy}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-repuestos_uy}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
